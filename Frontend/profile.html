<!DOCTYPE html>
<html>
<head>
    <title>Profile - MyLMS</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2>MyLMS</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="courses.html">Courses</a>
        <a href="assignments.html">Assignments</a>
<a href="#" onclick="logout()">Logout</a>    </aside>

    <div class="content-area">

        <div class="top-navbar">
            <div class="left">
                <h3>Profile</h3>
            </div>

            <div class="right">
                <button class="notification-btn">🔔</button>
<a href="profile.html" class="profile-btn" id="navUsername">User</a>            </div>
        </div>

        <main class="main-content">

           <div class="profile-card">
    <h2>Student Information</h2>
    <p><strong>Name:</strong> <span id="name"></span></p>
    <p><strong>Email:</strong> <span id="email"></span></p>
    <p><strong>Program:</strong> <span id="program"></span></p>
    <p><strong>Level:</strong> <span id="level"></span></p>
</div>
        </main>

    </div>

</div>


<script>

const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

// 🔐 Protect page
if (!token || !user) {
    alert("Please login first");
    window.location.href = "login.html";
}

// ✅ Navbar username
document.getElementById("navUsername").textContent = user.fullname;

// ✅ Profile details
document.getElementById("name").textContent = user.fullname;
document.getElementById("email").textContent = user.email;

// Optional fields (in case backend doesn't send them yet)
document.getElementById("program").textContent = user.program || "Not set";
document.getElementById("level").textContent = user.level || "Not set";

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>
</body>
</html>
