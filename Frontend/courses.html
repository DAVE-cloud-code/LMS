<!DOCTYPE html>
<html>
<head>
    <title>All Courses - MyLMS</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>MyLMS</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="courses.html">Courses</a>
        <a href="index.html">Logout</a>
    </aside>

    <!-- Main Content -->
     <div class="content-area">

        <div class="top-navbar">
            <h3>Courses</h3>
        </div>

        <main class="main-content">

            <h1>Available Courses</h1>

            <div id="coursesContainer" class="card-grid"></div>

        </main>

    </div>

</div>


<script>
const token = localStorage.getItem("token");

// 🔐 Protect page
if (!token) {
    window.location.href = "login.html";
}

async function loadCourses() {
    try {
        const res = await fetch("https://lms-back-7t0r.onrender.com/api/courses", {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        const courses = await res.json();

        const container = document.getElementById("coursesContainer");
        container.innerHTML = "";

        courses.forEach(course => {

            const div = document.createElement("div");
            div.classList.add("course-card");

            div.innerHTML = `
                <img src="${course.thumbnail || '/images/default.jpg'}" class="course-img"/>
                <h3>${course.title}</h3>
                <p>${course.description}</p>
                <button id="btn-${course._id}" onclick="enrollCourse('${course._id}')">
                    Enroll
                </button>
            `;

            container.appendChild(div);
        });

    } catch (error) {
        console.error("Error:", error);
    }
}

async function enrollCourse(courseId) {
    const btn = document.getElementById(`btn-${courseId}`);

    btn.textContent = "Enrolling...";
    btn.disabled = true;

    try {
        const res = await fetch(`https://lms-back-7t0r.onrender.com/api/courses/enroll/${courseId}`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        const data = await res.json();

        if (res.ok) {
            btn.textContent = "Enrolled ✅";
        } else {
            btn.textContent = "Try Again";
            btn.disabled = false;
            console.log(data.message);
        }

    } catch (error) {
        btn.textContent = "Error";
        btn.disabled = false;
        console.error(error);
    }
}

loadCourses();
</script>

</body>
</html>
