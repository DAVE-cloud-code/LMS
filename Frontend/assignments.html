<!DOCTYPE html>
<html>
<head>
    <title>Assignments - MyLMS</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>MyLMS</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="courses.html">Courses</a>
        <a href="assignments.html">Assignments</a>
 <a href="index.html" onclick="logout()">Logout</a>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <h1>My Assignments</h1>

<div class="assignment-grid" id="assignmentContainer"></div>

    </main>
</div>


<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));
const container = document.getElementById("assignmentContainer");

// 🔐 Protect page
if (!token || !user) {
    window.location.href = "login.html";
}

// 🧠 Step 1: Get all courses
async function loadAssignments() {
    try {
        const courseRes = await fetch("https://lms-back-7t0r.onrender.com/api/courses", {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        const courses = await courseRes.json();

        // 🧠 Filter only enrolled courses
        const enrolledCourses = courses.filter(course =>
            course.students.includes(user._id)
        );

        container.innerHTML = "";

        if (enrolledCourses.length === 0) {
            container.innerHTML = "<p>No enrolled courses yet.</p>";
            return;
        }

        // 🧠 Step 2: Fetch assignments per course
        for (let course of enrolledCourses) {

            const res = await fetch(
                `https://lms-back-7t0r.onrender.com/api/assignments/course/${course._id}`,
                {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                }
            );

            const assignments = await res.json();

            assignments.forEach(assignment => {

                const card = document.createElement("div");
                card.className = "assignment-card";

                card.innerHTML = `
                    <h3>${assignment.title}</h3>
                    <p>Course: ${course.title}</p>
                    <p>Due Date: ${new Date(assignment.dueDate).toDateString()}</p>
                    <a href="submit-assignment.html?id=${assignment._id}" class="view-btn">
                        View & Submit
                    </a>
                `;

                container.appendChild(card);
            });
        }

    } catch (error) {
        container.innerHTML = "<p>Error loading assignments</p>";
        console.log(error);
    }
}

loadAssignments();

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>
</body>
</html>
