<!DOCTYPE html>
<html>
<head>
    <title>My Attendance</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard">

<!-- Sidebar -->
<aside class="sidebar">
    <h2>Student Panel</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="assignments.html">Assignments</a>
    <a href="student-attendance.html">Attendance</a>
    <a href="#" onclick="logout()">Logout</a>
</aside>

<!-- Main -->
<main class="main-content">
    <h1>My Attendance</h1>

    <div id="attendanceContainer"></div>
</main>

</div>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if (!token || user.role !== "student") {
    window.location.href = "login.html";
}

const container = document.getElementById("attendanceContainer");

// 🔹 Load attendance
async function loadAttendance() {

    const res = await fetch("https://lms-back-7t0r.onrender.com/api/attendance/my", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const records = await res.json();

    container.innerHTML = "";

    if (records.length === 0) {
        container.innerHTML = "<p>No attendance records yet.</p>";
        return;
    }

    records.forEach(record => {

        const div = document.createElement("div");
        div.className = "attendance-card";

        const date = new Date(record.createdAt).toLocaleDateString();

        div.innerHTML = `
            <h3>${record.course.title}</h3>
            <p>Date: ${date}</p>
            <p>Status: 
                <span class="${record.status === 'present' ? 'present' : 'absent'}">
                    ${record.status}
                </span>
            </p>
        `;

        container.appendChild(div);
    });
}

loadAttendance();

// logout
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
