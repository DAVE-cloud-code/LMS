<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Pathe Initiative</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="WhatsApp Image 2026-03-07 at 11.08.01.jpeg" type="image/x-icon">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Welcome to Pathe's Classroom</h1>
        <h2>Create Account</h2>

       <form id="signupForm">
    <input type="text" id="fullname" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit" id="signupBtn">Sign Up</button>
    <p id="signupMessage" class="form-message"></p>
</form>

        <p class="switch-text">
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </div>
</div>



<script>
const form = document.getElementById("signupForm");
const btn = document.getElementById("signupBtn");
const message = document.getElementById("signupMessage");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const fullname = document.getElementById("fullname").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // 🔄 Loading state
    btn.textContent = "Creating account...";
    btn.disabled = true;
    message.textContent = "";
    
    try {
        const res = await fetch("https://lms-back-7t0r.onrender.com/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ fullname, email, password })
        });

        const data = await res.json();

        if (res.ok) {
            message.style.color = "green";
            message.textContent = "Account created successfully 🎉";

            // redirect after short delay
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        } else {
            message.style.color = "red";
            message.textContent = data.message || "Signup failed";
        }

    } catch (error) {
        message.style.color = "red";
        message.textContent = "Something went wrong";
    }

    // 🔁 Reset button
    btn.textContent = "Sign Up";
    btn.disabled = false;
});
</script>
</body>
</html>
