<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard">

<aside class="sidebar">
    <h2>Instructor Panel</h2>
    <a href="instructor-dashboard.html">Dashboard</a>
    <a href="instructor-courses.html">My Courses</a>
    <a href="create-course.html">Create Course</a>
    <a href="instructor-assignments.html">Assignments</a>
    <a href="attendance.html">Attendance</a>
</aside>
<main class="main-content">

    <h1>Start Class</h1>

    <form id="classForm">

        <select id="course"></select>

        <input
            type="text"
            id="topic"
            placeholder="Class Topic"
            required
        >

        <button type="submit" id="btn">
            Start Class
        </button>

        <p id="msg"></p>

    </form>

    <hr>

    <h2>My Sessions</h2>

    <div id="sessionContainer"></div>

</main>

</div>

<script>

const token = localStorage.getItem("token");

const user = JSON.parse(localStorage.getItem("user"));

if (!token || user.role !== "instructor") {
    window.location.href = "login.html";
}

const courseSelect = document.getElementById("course");



// ✅ Load instructor courses
async function loadCourses(){

    const res = await fetch(
        "https://lms-back-7t0r.onrender.com/api/courses",
        {
            headers:{
                Authorization:`Bearer ${token}`
            }
        }
    );

    const courses = await res.json();

    const myCourses = courses.filter(
        c => c.instructor._id === user._id
    );

    myCourses.forEach(course => {

        courseSelect.innerHTML += `
            <option value="${course._id}">
                ${course.title}
            </option>
        `;

    });

}

loadCourses();




// ✅ Start class
document
.getElementById("classForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const res = await fetch(
        "https://lms-back-7t0r.onrender.com/api/class/start",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                Authorization:`Bearer ${token}`
            },
            body:JSON.stringify({
                courseId: course.value,
                topic: topic.value
            })
        }
    );

    const data = await res.json();

    if(res.ok){

        document.getElementById("msg").innerHTML = `
            Class Started ✅ <br><br>

            Attendance Code:
            <strong>${data.session.attendanceCode}</strong>
        `;

        loadSessions();

    }

});




// ✅ Load sessions
async function loadSessions(){

    const res = await fetch(
        "https://lms-back-7t0r.onrender.com/api/class/instructor",
        {
            headers:{
                Authorization:`Bearer ${token}`
            }
        }
    );

    const sessions = await res.json();

    const container =
        document.getElementById("sessionContainer");

    container.innerHTML = "";

    sessions.forEach(session=>{

        container.innerHTML += `
            <div class="course-card">

                <h3>${session.course.title}</h3>

                <p>
                    Topic:
                    ${session.topic}
                </p>

                <p>
                    Attendance:
                    ${session.studentsPresent.length}
                    students
                </p>

                <p>
                    Code:
                    <strong>
                        ${session.attendanceCode}
                    </strong>
                </p>

                <button
                    onclick="endClass('${session._id}')"
                >
                    End Class
                </button>

            </div>
        `;

    });

}

loadSessions();




// ✅ End class
async function endClass(id){

    await fetch(
        `https://lms-back-7t0r.onrender.com/api/class/end/${id}`,
        {
            method:"PUT",
            headers:{
                Authorization:`Bearer ${token}`
            }
        }
    );

    loadSessions();

}

</script>

</body>
</html>
