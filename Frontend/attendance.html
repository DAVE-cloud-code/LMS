<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard">

<aside class="sidebar">
    <h2>Instructor Panel</h2>
    <a href="instructor-dashboard.html">Dashboard</a>
    <a href="instructor-courses.html">My Courses</a>
    <a href="create-course.html">Create Course</a>
    <a href="instructor-assignments.html">Assignments</a>
    <a href="attendance.html">Attendance</a>
    <a href="#" onclick="logout()">Logout</a>
</aside>

<main class="main-content">

    <h1>Mark Attendance</h1>

    <div id="studentContainer"></div>

    <button onclick="saveAttendance()">
        Save Attendance
    </button>

    <p id="msg"></p>

</main>

</div>

<script>
const token = localStorage.getItem("token");

const container = document.getElementById("studentContainer");

let attendanceRecords = [];

// ✅ Load students
async function loadStudents() {

    const res = await fetch(
        "https://lms-back-7t0r.onrender.com/api/students",
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        }
    );

    const students = await res.json();

    container.innerHTML = "";

    attendanceRecords = [];

    students.forEach(student => {

        container.innerHTML += `
            <div class="course-card">

                <h3>${student.fullname}</h3>

                <select
                    onchange="updateStatus('${student._id}', this.value)"
                >
                    <option value="present">
                        Present
                    </option>

                    <option value="absent">
                        Absent
                    </option>
                </select>

            </div>
        `;

        attendanceRecords.push({
            student: student._id,
            status: "present"
        });
    });
}

// ✅ Update attendance status
function updateStatus(studentId, status) {

    const record = attendanceRecords.find(
        r => r.student === studentId
    );

    record.status = status;
}

// ✅ Save attendance
async function saveAttendance() {

    await fetch(
        "https://lms-back-7t0r.onrender.com/api/attendance/mark",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
            },

            body: JSON.stringify({
                records: attendanceRecords
            })
        }
    );

    document.getElementById("msg").textContent =
        "Attendance saved successfully";
}

loadStudents();

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>

</body>
</html>
