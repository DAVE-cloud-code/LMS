<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Pathe Initiative</title>
    <link rel="stylesheet" href="css/style.css">
        <link rel="shortcut icon" href="WhatsApp Image 2026-03-07 at 11.08.01.jpeg" type="image/x-icon">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="sub-text">Login to continue learning</p>

   <form id="loginForm">
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
<button type="submit" id="loginBtn">Login</button>
<p id="loginMessage" class="form-message"></p>
</form>

        <p class="switch-text">
            Don't have an account?
            <a href="index.html">Sign Up</a>
        </p>
    </div>
</div>



<script>
const form = document.getElementById("loginForm");
const btn = document.getElementById("loginBtn");
const message = document.getElementById("loginMessage");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // 🔄 Loading state
    btn.textContent = "Logging in...";
    btn.disabled = true;
    message.textContent = "";

    try {
        const res = await fetch("https://lms-back-7t0r.onrender.com/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
            message.style.color = "green";
            message.textContent = "Login successful 🎉";

            // ✅ Save user + token
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
        } else {
            message.style.color = "red";
            message.textContent = data.message || "Invalid credentials";
        }

    } catch (error) {
        message.style.color = "red";
        message.textContent = "Something went wrong";
    }

    // 🔁 Reset button
    btn.textContent = "Login";
    btn.disabled = false;
});
</script>
</body>
</html>
