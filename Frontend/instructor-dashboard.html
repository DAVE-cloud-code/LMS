<!DOCTYPE html>
<html>
<head>
    <title>Instructor Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2>Instructor Panel</h2>
        <a href="instructor-dashboard.html">Dashboard</a>
        <a href="instructor-courses.html">My Courses</a>
        <a href="create-course.html">Create Course</a>
        <a href="attendance.html">Attendance</a>
        <a href="instructor-assignments.html">Assignments</a>
        <a href="#" onclick="logout()">Logout</a>
    </aside>

    <main class="main-content">
        <h1 id="welcomeText">Welcome 👋</h1>

        <h2>My Courses</h2>
        <div class="card-grid" id="courseContainer"></div>
    </main>

</div>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if (!token || user.role !== "instructor") {
    window.location.href = "login.html";
}

document.getElementById("welcomeText").textContent =
    `Welcome, ${user.fullname}`;

const container = document.getElementById("courseContainer");

// Load instructor courses
async function loadCourses() {
    const res = await fetch("https://lms-back-7t0r.onrender.com/api/courses", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const courses = await res.json();

        const myCourses = courses.filter(c => c.instructor._id === user._id);

    container.innerHTML = "";

    myCourses.forEach(course => {
        const card = document.createElement("div");
        card.className = "course-card";

        card.innerHTML = `
            <h3>${course.title}</h3>
            <p>${course.category}</p>
            <p>${course.description}</p>
        `;

        container.appendChild(card);
    });
}

loadCourses();

function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
