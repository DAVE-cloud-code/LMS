<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Pathe Initiative</title>
    <link rel="stylesheet" href="css/dashboard.css">
        <link rel="shortcut icon" href="WhatsApp Image 2026-03-07 at 11.08.01.jpeg" type="image/x-icon">
</head>
<body>

<div class="dashboard">
  <aside class="sidebar">
    <h2>Pathe Initiative</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="assignments.html">Assignments</a>
        <a href="attendance.html">Attendance</a>
    <a href="index.html">Logout</a>
</aside>


<div class="content-area">

    <!-- TOP NAVBAR -->
    <div class="top-navbar">
          <div class="left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h3>Dashboard</h3>
    </div>

        <div class="right">
            <button class="notification-btn">🔔</button>
<a href="profile.html" class="profile-btn" id="username">User</a>        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="main-content">
<h1 id="welcomeText">Welcome 👋</h1>
       <div class="card-grid">

    <div class="course-card">
        <h3>Total Courses</h3>
        <p id="totalCourses">0</p>
    </div>

    <div class="course-card">
        <h3>Pending Assignments</h3>
        <p id="pendingAssignments">0</p>
    </div>

    <div class="course-card">
        <h3>Completed</h3>
        <p id="completedAssignments">0</p>
    </div>

</div>

<h2 style="margin-top: 30px;">Your Courses</h2>
<div id="coursesContainer"></div>
    </main>

</div>


</div>





<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

// 🔐 Protect page
if (!token || !user) {
    alert("Please login first");
    window.location.href = "login.html";
}

// ✅ Set username in navbar
document.getElementById("username").textContent = user.fullname;

// ✅ Set welcome text
document.getElementById("welcomeText").textContent = `Welcome, ${user.fullname.split(" ")[0]} 👋`;


function toggleSidebar() {
    document.querySelector(".sidebar").classList.toggle("active");
}

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

async function loadDashboard() {
    try {
        const res = await fetch("https://lms-back-7t0r.onrender.com/api/courses", {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        const courses = await res.json();

        // Update total courses
        document.getElementById("totalCourses").textContent = courses.length;

        const container = document.getElementById("coursesContainer");
        container.innerHTML = "";

        courses.forEach(course => {
            const div = document.createElement("div");
            div.classList.add("course-card");

            div.innerHTML = `
                <h3>${course.title}</h3>
                <p>Instructor: ${course.instructor || "N/A"}</p>
            `;

            container.appendChild(div);
        });

    } catch (error) {
        console.error("Error loading dashboard:", error);
    }
}

loadDashboard();



</script>

</body>
</html>
