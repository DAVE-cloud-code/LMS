<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2>Admin Panel</h2>
        <a href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Courses</a>
        <a href="#" onclick="logout()">Logout</a>
    </aside>

    <main class="main-content">

        <h1>Admin Dashboard</h1>

        <h2>All Users</h2>
        <div id="usersContainer"></div>

    </main>

</div>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if (!token || user.role !== "admin") {
    window.location.href = "login.html";
}

const container = document.getElementById("usersContainer");

// 🔹 Load all users
async function loadUsers() {
    const res = await fetch("https://lms-back-7t0r.onrender.com/api/auth/users", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const users = await res.json();

    container.innerHTML = "";

    users.forEach(u => {
        const div = document.createElement("div");

        div.innerHTML = `
            <p>${u.fullname} (${u.role})</p>
            <button onclick="makeInstructor('${u._id}')">
                Make Instructor
            </button>
        `;

        container.appendChild(div);
    });
}

loadUsers();

// 🔹 Promote user
async function makeInstructor(id) {
    await fetch(`https://lms-back-7t0r.onrender.com/api/auth/make-instructor/${id}`, {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}` }
    });

    loadUsers();
}

function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
