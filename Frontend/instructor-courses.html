<!DOCTYPE html>
<html>
<head>
    <title>My Courses</title>
    <link rel="stylesheet" href="css/dashboard.css">

    <style>
        .course-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.course-actions button {
    padding: 5px 10px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.course-actions button:first-child {
    background: #3498db;
    color: white;
}

.course-actions button:last-child {
    background: red;
    color: white;
}
    </style>
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2>Instructor Panel</h2>
        <a href="instructor-dashboard.html">Dashboard</a>
        <a href="instructor-courses.html">My Courses</a>
        <a href="create-course.html">Create Course</a>
        <a href="instructor-assignments.html">Assignments</a>
        <a href="attendance.html">Attendance</a>
        <a href="#" onclick="logout()">Logout</a>
    </aside>

    <main class="main-content">
        <h1>My Courses</h1>

        <div class="card-grid" id="courseContainer"></div>
    </main>

</div>
<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if (!token || user.role !== "instructor") {
    window.location.href = "login.html";
}

const container = document.getElementById("courseContainer");

// 🔹 Load instructor courses
async function loadCourses() {
    try {
        const res = await fetch("https://lms-back-7t0r.onrender.com/api/courses", {
            headers: { Authorization: `Bearer ${token}` }
        });

        const courses = await res.json();

        console.log("ALL COURSES:", courses); // 🔍 debug

        // ✅ FIXED FILTER
        const myCourses = courses.filter(c => c.instructor._id === user._id);

        container.innerHTML = "";

        if (myCourses.length === 0) {
            container.innerHTML = "<p>No courses yet</p>";
            return;
        }

        myCourses.forEach(course => {
            const card = document.createElement("div");
            card.className = "course-card";

            card.innerHTML = `
                <img src="${course.thumbnail || '/images/default.jpg'}" class="course-img">

                <h3>${course.title}</h3>
                <p><strong>Category:</strong> ${course.category}</p>
                <p>${course.description}</p>

                <div class="course-actions">
                    <button onclick="editCourse('${course._id}')">Edit</button>
                    <button onclick="deleteCourse('${course._id}')">Delete</button>
                </div>
            `;

            container.appendChild(card);
        });

    } catch (err) {
        container.innerHTML = "<p>Error loading courses</p>";
    }
}

loadCourses();


// ✏️ EDIT COURSE (redirect for now)
function editCourse(courseId) {
    window.location.href = `edit-course.html?id=${courseId}`;
}


// 🗑 DELETE COURSE
async function deleteCourse(courseId) {
    const confirmDelete = confirm("Are you sure you want to delete this course?");
    if (!confirmDelete) return;

    try {
        const res = await fetch(`https://lms-back-7t0r.onrender.com/api/courses/${courseId}`, {
            method: "DELETE",
            headers: {
                Authorization: `Bearer ${token}`
            }
        });

        const data = await res.json();

        if (res.ok) {
            alert("Course deleted successfully");
            loadCourses(); // 🔄 refresh
        } else {
            alert(data.message);
        }

    } catch (err) {
        alert("Error deleting course");
    }
}


function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

</body>
</html>
