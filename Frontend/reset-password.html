<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Pathe Initiative</title>

<link rel="stylesheet" href="css/style.css">

<style>
body {
    background: #f4f6f9;
    font-family: Arial, sans-serif;
}

.auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.auth-card {
    background: white;
    padding: 30px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.auth-card h1 {
    margin-bottom: 10px;
}

.auth-card input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.auth-card button {
    width: 100%;
    padding: 12px;
    background: #0a7f5a;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.auth-card button:hover {
    background: #086648;
}

.form-message {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Reset Password</h1>
        <p>Enter your new password</p>

        <form id="resetForm">
            <input type="password" id="password" placeholder="New Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

            <button type="submit" id="resetBtn">Reset Password</button>
            <p id="resetMessage" class="form-message"></p>
        </form>
    </div>
</div>

<script>
const form = document.getElementById("resetForm");
const btn = document.getElementById("resetBtn");
const message = document.getElementById("resetMessage");

// 🔑 Get token from URL
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

if (!token) {
    message.style.color = "red";
    message.textContent = "Invalid or missing reset token";
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    // ❌ Password mismatch check
    if (password !== confirmPassword) {
        message.style.color = "red";
        message.textContent = "Passwords do not match";
        return;
    }

    // 🔄 Loading state
    btn.textContent = "Resetting...";
    btn.disabled = true;
    message.textContent = "";

    try {
        const res = await fetch(`https://lms-back-7t0r.onrender.com/api/auth/reset-password/${token}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (res.ok) {
            message.style.color = "green";
            message.textContent = "Password reset successful 🎉";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        } else {
            message.style.color = "red";
            message.textContent = data.message || "Reset failed";
        }

    } catch (error) {
        message.style.color = "red";
        message.textContent = "Something went wrong";
    }

    // 🔁 Reset button
    btn.textContent = "Reset Password";
    btn.disabled = false;
});
</script>

</body>
</html>
