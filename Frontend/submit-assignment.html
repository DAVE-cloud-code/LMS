<!DOCTYPE html>
<html>
<head>
    <title>Submit Assignment - MyLMS</title>
    <link rel="stylesheet" href="css/dashboard.css">
        <link rel="shortcut icon" href="WhatsApp Image 2026-03-07 at 11.08.01.jpeg" type="image/x-icon">
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2>MyLMS</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="courses.html">Courses</a>
        <a href="assignments.html">Assignments</a>
        <a href="index.html">Logout</a>
    </aside>

    <main class="main-content">
       <h1 id="assignmentTitle"></h1>

<div class="assignment-details">
    <p><strong>Description:</strong></p>
    <p id="assignmentDescription"></p>

    <p><strong>Due Date:</strong> <span id="assignmentDueDate"></span></p>

    <hr>

    <h3>Submit Your Work</h3>

    <form id="submitForm">
        <textarea id="submissionContent" placeholder="Write your submission..." required></textarea>
        <button type="submit" class="submit-btn" id="submitBtn">Submit Assignment</button>
        <p id="submitMessage"></p>
    </form>
</div>
    </main>

</div>


<script>
const token = localStorage.getItem("token");
const params = new URLSearchParams(window.location.search);
const assignmentId = params.get("id");

const titleEl = document.querySelector("h1");
const descEl = document.querySelector(".assignment-details p:nth-of-type(2)");
const dueEl = document.querySelector(".assignment-details p:nth-of-type(3)");

async function loadAssignment() {
    try {
        const res = await fetch(
            `https://lms-back-7t0r.onrender.com/api/assignments/${assignmentId}`,
            {
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            }
        );

        const assignment = await res.json();

        titleEl.textContent = assignment.title;
        descEl.textContent = assignment.description;
        dueEl.innerHTML = `<strong>Due Date:</strong> ${new Date(assignment.dueDate).toDateString()}`;

    } catch (error) {
        console.log(error);
    }
}

loadAssignment();

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>
</body>
</html>
